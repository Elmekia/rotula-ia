services:

  postgres:
    image: postgres:16-alpine
    container_name: rotula-postgres
    environment:
      POSTGRES_DB: rotula_db
      POSTGRES_USER: rotula_user
      POSTGRES_PASSWORD: rotula_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotula_user -d rotula_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: rotula-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rotula_db
      SPRING_DATASOURCE_USERNAME: rotula_user
      SPRING_DATASOURCE_PASSWORD: rotula_pass
      JWT_SECRET: dev-secret-change-in-production-min-32-chars
      APP_ENV: development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: rotula-frontend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
