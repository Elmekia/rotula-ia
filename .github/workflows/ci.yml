name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rotula_test
          POSTGRES_USER: rotula_user
          POSTGRES_PASSWORD: rotula_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rotula_user -d rotula_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/rotula_test
          SPRING_DATASOURCE_USERNAME: rotula_user
          SPRING_DATASOURCE_PASSWORD: rotula_pass
          JWT_SECRET: test-secret-for-ci-minimum-32-characters
        run: mvn verify

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build