spring:
  application:
    name: rotula-ia-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rotula_db}
    username: ${SPRING_DATASOURCE_USERNAME:rotula_user}
    password: ${SPRING_DATASOURCE_PASSWORD:rotula_pass}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    open-in-view: false          # Libera conexiones al terminar el service layer, no al terminar el request
    hibernate:
      ddl-auto: validate        # Flyway maneja el schema, Hibernate solo valida
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars}
    expiration-ms: 86400000      # 24 horas
    refresh-expiration-ms: 604800000  # 7 días

logging:
  level:
    ar.com.rotula: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
